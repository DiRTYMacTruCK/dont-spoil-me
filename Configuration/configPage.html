<div id="DontSpoilMeConfigPage">
    <div class="content-primary">
        <div class="verticalSection">
            <div class="sectionTitleContainer">
                <h2 class="sectionTitle">🙈 dont-spoil-me</h2>
            </div>
            <p>Shows the series poster instead of episode thumbnails to prevent spoilers.</p>

            <div class="checkboxContainer">
                <label>
                    <input id="chkEnabled" type="checkbox" is="emby-checkbox" />
                    <span>Enable dont-spoil-me</span>
                </label>
            </div>

            <div class="checkboxContainer">
                <label>
                    <input id="chkOnlyUnwatched" type="checkbox" is="emby-checkbox" />
                    <span>Only hide thumbnails for unwatched episodes</span>
                </label>
            </div>

            <br/>
            <button id="btnSave" is="emby-button" type="button" class="raised button-submit block">
                <span>Save</span>
            </button>
            <p id="saveStatus" style="color:#7c7; display:none;">Settings saved.</p>
        </div>
    </div>

    <script type="text/javascript">
        (function() {
            var pluginId = 'b2c3d4e5-f6a7-8901-bcde-f12345678901';

            function loadConfig() {
                ApiClient.getPluginConfiguration(pluginId).then(function(config) {
                    document.getElementById('chkEnabled').checked = config.IsEnabled;
                    document.getElementById('chkOnlyUnwatched').checked = config.OnlyUnwatched;
                });
            }

            document.getElementById('btnSave').addEventListener('click', function() {
                ApiClient.getPluginConfiguration(pluginId).then(function(config) {
                    config.IsEnabled = document.getElementById('chkEnabled').checked;
                    config.OnlyUnwatched = document.getElementById('chkOnlyUnwatched').checked;
                    ApiClient.updatePluginConfiguration(pluginId, config).then(function() {
                        var status = document.getElementById('saveStatus');
                        status.style.display = 'block';
                        setTimeout(function() { status.style.display = 'none'; }, 3000);
                    });
                });
            });

            loadConfig();
        })();
    </script>
</div>
